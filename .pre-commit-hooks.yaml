# https://pre-commit.com/#creating-new-hooks — required at repo root when this
# project is used as a pre-commit `repo:` source (local path, git URL, etc.).

- id: model-allowed-keys
  name: dbt model allowed keys
  description: Validate top-level keys on each model entry in dbt property YAML
  entry: model-allowed-keys
  language: python
  types: [yaml]

- id: macro-allowed-keys
  name: dbt macro allowed keys
  description: Validate top-level keys on each macro entry in dbt property YAML
  entry: macro-allowed-keys
  language: python
  types: [yaml]

- id: seed-allowed-keys
  name: dbt seed allowed keys
  description: Validate top-level keys on each seed entry in dbt property YAML
  entry: seed-allowed-keys
  language: python
  types: [yaml]

- id: snapshot-allowed-keys
  name: dbt snapshot allowed keys
  description: Validate top-level keys on each snapshot entry in dbt property YAML
  entry: snapshot-allowed-keys
  language: python
  types: [yaml]

- id: exposure-allowed-keys
  name: dbt exposure allowed keys
  description: Validate top-level keys on each exposure entry in dbt property YAML
  entry: exposure-allowed-keys
  language: python
  types: [yaml]

- id: model-allowed-meta-keys
  name: dbt model allowed meta keys
  description: Validate keys on config.meta for each model entry in dbt property YAML
  entry: model-allowed-meta-keys
  language: python
  types: [yaml]

- id: seed-allowed-meta-keys
  name: dbt seed allowed meta keys
  description: Validate keys on config.meta for each seed entry in dbt property YAML
  entry: seed-allowed-meta-keys
  language: python
  types: [yaml]

- id: snapshot-allowed-meta-keys
  name: dbt snapshot allowed meta keys
  description: Validate keys on config.meta for each snapshot entry in dbt property YAML
  entry: snapshot-allowed-meta-keys
  language: python
  types: [yaml]

- id: exposure-allowed-meta-keys
  name: dbt exposure allowed meta keys
  description: Validate keys on config.meta for each exposure entry in dbt property YAML
  entry: exposure-allowed-meta-keys
  language: python
  types: [yaml]

- id: macro-allowed-meta-keys
  name: dbt macro allowed meta keys
  description: Validate keys on config.meta for each macro entry in dbt property YAML
  entry: macro-allowed-meta-keys
  language: python
  types: [yaml]

- id: model-meta-accepted-values
  name: dbt model meta accepted values
  description: Validate a string leaf under config.meta against a comma-separated allowlist (dot path via --key)
  entry: model-meta-accepted-values
  language: python
  types: [yaml]
