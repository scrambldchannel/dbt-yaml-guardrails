repos:

  # Fast linting + import sorting
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.1.14
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  # Common hygiene checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        exclude: ^tests/fixtures/yaml/shared/whitespace_only\.yml$
      - id: end-of-file-fixer
        exclude: ^tests/fixtures/yaml/shared/whitespace_only\.yml$
      - id: check-docstring-first
      - id: check-added-large-files
      - id: debug-statements
      - id: no-commit-to-branch
        args: ['--branch', 'main']

  # Type checking
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.8.0
    hooks:
      - id: mypy
        additional_dependencies:
          - types-PyYAML

  # Local hook CLIs (same [project.scripts] as consumers), scoped to tests/hook_sandbox/sandbox.yml only.
  # Stages: [manual] — run with: pre-commit run --hook-stage manual --all-files
  #   or:    pre-commit run dbtg-sandbox-model-allowed-keys --all-files
  # See specs/testing-strategy.md § Local pre-commit.
  - repo: local
    hooks:
      - id: dbtg-sandbox-model-allowed-keys
        name: (sandbox) model-allowed-keys
        entry: uv run model-allowed-keys
        language: system
        pass_filenames: true
        files: ^tests/hook_sandbox/sandbox\.yml$
        args: ['--required', 'description', '--forbidden', 'version']
        stages: [manual]
      - id: dbtg-sandbox-macro-allowed-keys
        name: (sandbox) macro-allowed-keys
        entry: uv run macro-allowed-keys
        language: system
        pass_filenames: true
        files: ^tests/hook_sandbox/sandbox\.yml$
