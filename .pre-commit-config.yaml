        language: system
        pass_filenames: true
        files: ^tests/hook_sandbox/sandbox\.yml$
        stages: [manual]
      - id: dbtg-sandbox-source-allowed-keys
        name: (sandbox) source-allowed-keys
        entry: uv run source-allowed-keys
        language: system
        pass_filenames: true
        files: ^tests/hook_sandbox/sandbox\.yml$
        args: ['--required', 'description', '--forbidden', 'overrides']
        stages: [manual]
      - id: dbtg-sandbox-snapshot-allowed-keys
