repos:
  - repo: local
    hooks:
      # ``--fix-legacy-yaml`` renames legacy ``tests`` before validation on the same pass.
      # Pre-commit may exit non-zero the first time the file is modified ("files were modified");
      # run ``make sandbox-hooks`` again.
      - id: dbtg-sandbox-model-allowed-keys
        name: (sandbox) model-allowed-keys
        entry: uv run model-allowed-keys
        language: system
        pass_filenames: true
        args:
          - '--fix-legacy-yaml'
          - 'true'
          - '--required'
          - 'description'
          - '--forbidden'
          - 'version'
      - id: dbtg-sandbox-macro-allowed-keys
        name: (sandbox) macro-allowed-keys
        entry: uv run macro-allowed-keys
        language: system
        pass_filenames: true
      - id: dbtg-sandbox-seed-allowed-keys
        name: (sandbox) seed-allowed-keys
        entry: uv run seed-allowed-keys
        language: system
        pass_filenames: true
      - id: dbtg-sandbox-source-allowed-keys
        name: (sandbox) source-allowed-keys
        entry: uv run source-allowed-keys
        language: system
        pass_filenames: true
        args: ['--required', 'description', '--forbidden', 'overrides']
      - id: dbtg-sandbox-snapshot-allowed-keys
        name: (sandbox) snapshot-allowed-keys
        entry: uv run snapshot-allowed-keys
        language: system
        pass_filenames: true
      - id: dbtg-sandbox-exposure-allowed-keys
        name: (sandbox) exposure-allowed-keys
        entry: uv run exposure-allowed-keys
        language: system
        pass_filenames: true
      - id: dbtg-sandbox-catalog-allowed-keys
        name: (sandbox) catalog-allowed-keys
        entry: uv run catalog-allowed-keys
        language: system
        pass_filenames: true
      - id: dbtg-sandbox-dbt-project-allowed-keys
        name: (sandbox) dbt-project-allowed-keys
        entry: uv run dbt-project-allowed-keys
        language: system
        pass_filenames: true
        files: ^tests/hook_sandbox/dbt_project\.yml$
      - id: dbtg-sandbox-model-allowed-config-keys
        name: (sandbox) model-allowed-config-keys
        entry: uv run model-allowed-config-keys
        language: system
        pass_filenames: true
      - id: dbtg-sandbox-macro-allowed-config-keys
        name: (sandbox) macro-allowed-config-keys
        entry: uv run macro-allowed-config-keys
        language: system
        pass_filenames: true
      - id: dbtg-sandbox-seed-allowed-config-keys
        name: (sandbox) seed-allowed-config-keys
        entry: uv run seed-allowed-config-keys
        language: system
        pass_filenames: true
      - id: dbtg-sandbox-source-allowed-config-keys
        name: (sandbox) source-allowed-config-keys
        entry: uv run source-allowed-config-keys
        language: system
        pass_filenames: true
      - id: dbtg-sandbox-snapshot-allowed-config-keys
        name: (sandbox) snapshot-allowed-config-keys
        entry: uv run snapshot-allowed-config-keys
        language: system
        pass_filenames: true
      - id: dbtg-sandbox-exposure-allowed-config-keys
        name: (sandbox) exposure-allowed-config-keys
        entry: uv run exposure-allowed-config-keys
        language: system
        pass_filenames: true
      - id: dbtg-sandbox-model-allowed-column-keys
        name: (sandbox) model-allowed-column-keys
        entry: uv run model-allowed-column-keys
        language: system
        pass_filenames: true
        args: ['--required', 'description']
      - id: dbtg-sandbox-seed-allowed-column-keys
        name: (sandbox) seed-allowed-column-keys
        entry: uv run seed-allowed-column-keys
        language: system
        pass_filenames: true
