# Ringfenced YAML for ad-hoc local hook runs (see specs/testing-strategy.md § Local pre-commit).
# Edit freely; not used by pytest fixtures.
version: 2

models:
  - name: sb_model
    description: sandbox
    config:
      tags: [nightly, finance]
      meta:
        domain: sales
        owner: sandbox
    deprecation_date: 2026-04-23
    columns:
      - name: id
        description: Primary key
        data_type: integer
        data_tests:
          - not_null
          - unique
      - name: created_at
        description: Row creation timestamp
        data_type: timestamp
        meta:
          pii: false
      - name: owner_email
        description: Owner email address
        data_type: varchar
        config:
          tags: [pii]
          meta:
            sensitivity: high

sources:
  - name: sb_src
    description: sandbox
    database: raw
    schema: public
    tables: []
    config:
      enabled: true
      tags: [nightly, finance]
      meta:
        domain: sales
        team: sandbox

seeds:
  - name: sb_seed
    description: sandbox
    config:
      tags: [raw, finance]
      meta:
        domain: sales
    columns:
      - name: id
        description: Primary key
        data_type: integer
      - name: amount
        description: Transaction amount
        data_type: numeric

snapshots:
  - name: sb_snap
    config:
      tags: [nightly]
      meta:
        domain: sales
    columns:
      - name: id
        description: Source primary key
        data_type: integer
      - name: dbt_scd_id
        description: SCD surrogate key
        data_type: varchar

exposures:
  - name: sb_exp
    type: dashboard
    owner:
      email: team@example.com
    config:
      tags: [finance, raw]
      meta:
        domain: sales

macros:
  - name: sb_macro
    config:
      meta:
        domain: sales
        owner: sandbox

catalogs:
  - name: sb_catalog
    write_integrations:
      - name: sb_write
        catalog_type: unity
        table_format: iceberg
        external_volume: sb_volume
